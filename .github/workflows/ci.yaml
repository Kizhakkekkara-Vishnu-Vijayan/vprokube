name: CI/CD - VProfile

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'helm/**'
      - 'kubedefs/**'
      - 'README.md'

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - run: mvn clean package -DskipTests

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: mvn test

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push APP only
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/vprofileapp:${{ github.run_id }} ./Docker-files/app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/vprofileapp:${{ github.run_id }}

  update-helm:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Update only APP tag
        run: |
          yq -i '.app.image.tag = strenv(GITHUB_RUN_ID)' helm/vprofile-chart/values.yaml

      - name: Commit & push
        run: |
          git config --global user.email "vishnuvijayan1405@gmail.com"
          git config --global user.name "Vishnu"
          git add helm/vprofile-chart/values.yaml
          git commit -m "Update APP image tag to ${{ github.run_id }}"
          git push
