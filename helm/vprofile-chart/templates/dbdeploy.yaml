apiVersion: apps/v1
kind: Deployment
metadata:
  name: vprodb
  labels:
    app: vprodb
spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: vprodb
  template:
    metadata:
      labels:
        app: vprodb
    spec:
      containers:
      - name: vprodb
        #image: docvishnu1/vprofiledb
        image: "{{ .Values.db.image.repository }}:{{ .Values.db.image.tag }}"
        imagePullPolicy: {{ .Values.db.image.pullPolicy }}

        resources:
        {{- toYaml .Values.db.resources | nindent 10 }}

        volumeMounts:
        - mountPath: /var/lib/mysql
          name: vpro-db-data
        ports:
        - name: vprodb-port
          containerPort: 3306
        env:
         - name: MYSQL_ROOT_PASSWORD
           valueFrom:
              secretKeyRef:
                name: app-secret
                key: db-pass

         - name: MYSQL_INNODB_BUFFER_POOL_SIZE
           value: "64M"
         - name: MYSQL_INNODB_LOG_BUFFER_SIZE
           value: "8M"
         - name: MYSQL_MAX_CONNECTIONS
           value: "50"


      volumes:
        - name: vpro-db-data
          persistentVolumeClaim:
            claimName: db-pv-claim
      
      initContainers:
        - name: busybox
          image: busybox:latest
          args: ["sh", "-c", "rm -rf /var/lib/mysql/lost+found || true"]
          volumeMounts:
           - name: vpro-db-data
             mountPath: /var/lib/mysql
